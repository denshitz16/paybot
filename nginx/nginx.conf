# Nginx reverse-proxy configuration for PayBot on EC2
#
# Place this file at:  /opt/paybot/nginx/nginx.conf
#
# SSL certificates (if using HTTPS):
#   /opt/paybot/nginx/ssl/fullchain.pem
#   /opt/paybot/nginx/ssl/privkey.pem
#
# Obtain a free cert with Let's Encrypt:
#   sudo snap install --classic certbot
#   sudo certbot certonly --standalone -d your-domain.com
#   sudo cp /etc/letsencrypt/live/your-domain.com/fullchain.pem /opt/paybot/nginx/ssl/
#   sudo cp /etc/letsencrypt/live/your-domain.com/privkey.pem   /opt/paybot/nginx/ssl/
#   sudo chmod 644 /opt/paybot/nginx/ssl/*.pem

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile           on;
    keepalive_timeout  65;
    client_max_body_size 20M;

    # Gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css text/javascript application/javascript
                    application/json application/xml image/svg+xml;

    # ── Upstream: FastAPI app ─────────────────────────────────────────────
    upstream paybot_app {
        server app:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect (comment out if not using SSL) ─────────────
    server {
        listen 80;
        server_name _;

        # Allow Let's Encrypt ACME challenge over HTTP
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ─────────────────────────────────────────────────────
    # Comment this block out (and uncomment the plain HTTP block below)
    # if you are not using SSL yet.
    server {
        listen 443 ssl;
        http2  on;
        server_name _;   # Replace with your actual domain, e.g. paybot.example.com

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # WebSocket support (used for real-time payment events)
        location /ws {
            proxy_pass         http://paybot_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_read_timeout 3600s;
        }

        # All other requests → FastAPI
        location / {
            proxy_pass         http://paybot_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }
    }

    # ── Plain HTTP server (no SSL) ────────────────────────────────────────
    # Uncomment this block and comment out the two server blocks above
    # when running without SSL (e.g. behind an AWS ALB that terminates TLS).
    #
    # server {
    #     listen 80;
    #     server_name _;
    #
    #     location /ws {
    #         proxy_pass         http://paybot_app;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Upgrade $http_upgrade;
    #         proxy_set_header   Connection "upgrade";
    #         proxy_set_header   Host $host;
    #         proxy_read_timeout 3600s;
    #     }
    #
    #     location / {
    #         proxy_pass         http://paybot_app;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Connection "";
    #         proxy_set_header   Host $host;
    #         proxy_set_header   X-Real-IP $remote_addr;
    #         proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header   X-Forwarded-Proto $scheme;
    #     }
    # }
}
