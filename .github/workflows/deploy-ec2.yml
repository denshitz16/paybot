name: Deploy to AWS EC2

# DEPRECATED: Railway-only repo. This workflow is intentionally disabled.
on: []

# ─── Required GitHub Secrets ─────────────────────────────────────────────────
# EC2_HOST        – Public IP or DNS name of your EC2 instance
# EC2_USER        – SSH username (e.g. ubuntu, ec2-user)
# EC2_SSH_KEY     – Contents of the PEM private key (-----BEGIN RSA PRIVATE KEY-----)
# EC2_APP_DIR     – Absolute path on the instance where the app lives (e.g. /opt/paybot)
#
# Optional (for environment variables passed to the app on the instance):
# All variables are written to $EC2_APP_DIR/backend/.env on the instance.
# You may also manage .env directly on the server and omit these secrets.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Run tests & build checks ──────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test-backend
    permissions:
      contents: read
      packages: write          # required to push to ghcr.io
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy to EC2 ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Validate EC2 secrets
        id: validate
        run: |
          missing=""
          [ -z "$EC2_HOST" ]    && missing="$missing EC2_HOST"
          [ -z "$EC2_USER" ]    && missing="$missing EC2_USER"
          [ -z "$EC2_SSH_KEY" ] && missing="$missing EC2_SSH_KEY"
          [ -z "$EC2_APP_DIR" ] && missing="$missing EC2_APP_DIR"
          if [ -n "$missing" ]; then
            echo "::warning::Missing secrets:$missing — skipping EC2 deployment."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}

      - name: Write SSH key
        if: steps.validate.outputs.skip == 'false'
        run: |
          install -m 600 /dev/null /tmp/ec2_key.pem
          printf '%s' "$EC2_SSH_KEY" > /tmp/ec2_key.pem
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Copy docker-compose.ec2.yml to instance
        if: steps.validate.outputs.skip == 'false'
        run: |
          scp -i /tmp/ec2_key.pem \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            docker-compose.ec2.yml \
            "$EC2_USER@$EC2_HOST:$EC2_APP_DIR/docker-compose.yml"
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}

      - name: Pull image & restart services
        if: steps.validate.outputs.skip == 'false'
        run: |
          IMAGE_TAG="ghcr.io/${{ github.repository }}:latest"
          ssh -i /tmp/ec2_key.pem \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            "$EC2_USER@$EC2_HOST" \
            "set -euo pipefail
             cd $EC2_APP_DIR

             # Authenticate with GHCR using the deployment token
             printf '%s' '${{ secrets.GITHUB_TOKEN }}' | \
               docker login ghcr.io -u '${{ github.actor }}' --password-stdin

             # Pull the latest image
             docker pull '${IMAGE_TAG}'

             # Update the image tag used by compose
             export APP_IMAGE='${IMAGE_TAG}'

             # Restart updated containers (recreates services whose image changed)
             docker compose up -d --remove-orphans

             # Prune dangling images to free disk space
             docker image prune -f"
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}

      - name: Remove SSH key
        if: always()
        run: rm -f /tmp/ec2_key.pem

      - name: Deployment summary
        if: steps.validate.outputs.skip == 'false'
        run: |
          echo "### 🚀 Deployed to EC2" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Host** | \`$EC2_HOST\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`ghcr.io/${{ github.repository }}:latest\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
