name: Generate Android project

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install React Native CLI
        run: |
          npm install -g react-native-cli

      - name: Init temporary RN project
        run: |
          npx react-native init tempapp --version 0.72.0 --npm

      - name: Move android folder into repo
        run: |
          rm -rf mobile/android || true
          mkdir -p mobile
          mv tempapp/android mobile/
          rm -rf tempapp
          ls -la mobile/android || true

      - name: Add React Native entry files if missing
        run: |
          mkdir -p mobile
          if [ ! -f mobile/index.js ]; then
            cat > mobile/index.js <<'EOF'
              import { AppRegistry } from 'react-native';
              import App from './src/App';
              import { name as appName } from './app.json';

              AppRegistry.registerComponent(appName, () => App);
            EOF
          fi
          if [ ! -f mobile/app.json ]; then
            cat > mobile/app.json <<'EOF'
              {
                "name": "tempapp",
                "displayName": "xend POS Terminal"
              }
            EOF
          fi
          if [ ! -f mobile/babel.config.js ]; then
            cat > mobile/babel.config.js <<'EOF'
              module.exports = {
                presets: ['module:metro-react-native-babel-preset'],
              };
            EOF
          fi

      - name: Commit android folder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mobile/android mobile/index.js mobile/app.json mobile/babel.config.js mobile/tsconfig.json
          git commit -m "chore: add generated Android native project" || echo "no changes to commit"
          git push origin HEAD:main || echo "push failed"
