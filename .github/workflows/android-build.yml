name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_VERSION: '24'
      JAVA_VERSION: '17'
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Android SDK tools
        run: |
          sudo mkdir -p $ANDROID_SDK_ROOT
          sudo chown -R $USER $ANDROID_SDK_ROOT
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline.zip
          unzip -q cmdline.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest || true
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Force metro preset version
        working-directory: mobile
        run: |
          echo "Ensuring metro-react-native-babel-preset@0.76.9 is installed"
          npm install --no-save metro-react-native-babel-preset@0.76.9

      - name: Install dependencies
        working-directory: mobile
        run: |
          npm install

      - name: Generate Android native project if missing
        run: |
          if [ ! -d mobile/android ]; then
            cd mobile
            npx react-native init tempapp --version 0.72.0
            mv tempapp/android ./android
            rm -rf tempapp
          else
            echo "mobile/android already exists"
          fi

      - name: Patch react-native-camera build config
        run: |
          python3 - <<'PY'
import pathlib, re
app_build = pathlib.Path('mobile/android/app/build.gradle')
if app_build.exists():
    text = app_build.read_text()
    if 'missingDimensionStrategy' not in text:
        lines = text.splitlines()
        out = []
        inserted = False
        for line in lines:
            out.append(line)
            if not inserted and re.match(r'^\s*defaultConfig\s*\{', line):
                out.append("        missingDimensionStrategy 'react-native-camera', 'general'")
                inserted = True
        if inserted:
            app_build.write_text('\n'.join(out) + '\n')
            print('Patched missingDimensionStrategy in', app_build)
PY

      - name: Build Android release (Gradle)
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease -x lint

      - name: Find unsigned APK
        id: findapk
        run: |
          echo "Looking for APK..."
          find mobile/android -type f -name "*release-unsigned*.apk" -print | head -n1 > unsigned_path.txt || true
          cat unsigned_path.txt || true
          echo "unsigned_path=$(cat unsigned_path.txt)" >> $GITHUB_OUTPUT

      - name: Decode keystore (if provided)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          echo "keystore created"

      - name: Sign and zipalign (if keystore present)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          APK_UNSIGNED=$(cat unsigned_path.txt)
          BUILD_TOOLS=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -n1)
          ZIPALIGN=$BUILD_TOOLS/zipalign
          APKSIGNER=$BUILD_TOOLS/apksigner
          echo "Using build-tools: $BUILD_TOOLS"
          ALIGNED=app-release-aligned.apk
          SIGNED=app-release-signed.apk
          $ZIPALIGN -v -p 4 "$APK_UNSIGNED" "$ALIGNED"
          $APKSIGNER sign --ks keystore.jks --ks-key-alias "$KEY_ALIAS" --ks-pass pass:$KEYSTORE_PASSWORD --key-pass pass:$KEY_PASSWORD --out "$SIGNED" "$ALIGNED"
          echo "signed=$SIGNED" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: |
            ${{ steps.findapk.outputs.unsigned_path }}
            app-release-signed.apk

      - name: Cleanup
        run: |
          rm -f keystore.jks || true

    # Note: Required secrets (set in repository Settings > Secrets):
    # - KEYSTORE_BASE64 (optional) : base64 encoded keystore.jks
    # - KEYSTORE_PASSWORD
    # - KEY_ALIAS
    # - KEY_PASSWORD
