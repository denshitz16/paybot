name: Build Android Release APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install npm dependencies
        run: |
          cd mobile_native || cd mobile
          npm ci

      - name: Decode Android keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${KEYSTORE_BASE64}" ]; then echo "ANDROID_KEYSTORE_BASE64 secret is missing"; exit 1; fi
          mkdir -p mobile_native/android/app || mkdir -p mobile/android/app
          echo "$KEYSTORE_BASE64" | base64 --decode > mobile_native/android/app/my-release-key.keystore || echo "$KEYSTORE_BASE64" | base64 --decode > mobile/android/app/my-release-key.keystore

      - name: Write signing properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "${KEYSTORE_PASSWORD}" ] || [ -z "${KEY_ALIAS}" ] || [ -z "${KEY_PASSWORD}" ]; then echo "One or more signing secrets are missing"; exit 1; fi
          cat > mobile_native/android/gradle.properties <<EOF
MYAPP_UPLOAD_STORE_FILE=my-release-key.keystore
MYAPP_UPLOAD_STORE_PASSWORD=${KEYSTORE_PASSWORD}
MYAPP_UPLOAD_KEY_ALIAS=${KEY_ALIAS}
MYAPP_UPLOAD_KEY_PASSWORD=${KEY_PASSWORD}
EOF

      - name: Make gradlew executable
        run: |
          chmod +x mobile_native/android/gradlew || chmod +x mobile/android/gradlew

      - name: Build release APK
        run: |
          set -e
          cd mobile_native/android || cd mobile/android
          ./gradlew assembleRelease --no-daemon -Pandroid.injected.signing.store.file=app/my-release-key.keystore

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: |
            mobile_native/android/app/build/outputs/apk/release/app-release.apk
            mobile/android/app/build/outputs/apk/release/app-release.apk
