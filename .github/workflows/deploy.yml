name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "8.10.0"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Lint
        working-directory: frontend
        run: pnpm run lint

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    permissions:
      contents: read
    environment: production

    steps:
      - uses: actions/checkout@v4
      - name: Check Railway token
        id: validate
        run: |
          # Prefer Secrets, fallback to repository Variables.
          RAILWAY_TOKEN="${{ secrets.RAILWAY_TOKEN }}"
          if [ -z "$RAILWAY_TOKEN" ]; then
            RAILWAY_TOKEN="${{ vars.RAILWAY_TOKEN }}"
          fi

          RAILWAY_SERVICE="${{ secrets.RAILWAY_SERVICE }}"
          if [ -z "$RAILWAY_SERVICE" ]; then
            RAILWAY_SERVICE="${{ vars.RAILWAY_SERVICE }}"
          fi

          RAILWAY_SERVICE_ID="${{ secrets.RAILWAY_SERVICE_ID }}"
          if [ -z "$RAILWAY_SERVICE_ID" ]; then
            RAILWAY_SERVICE_ID="${{ vars.RAILWAY_SERVICE_ID }}"
          fi

          # Use service ID selector only (service names are brittle across environments).
          SERVICE_SELECTOR="$RAILWAY_SERVICE_ID"

          # Last-resort fallback to known PayBot Railway service ID.
          if [ -z "$SERVICE_SELECTOR" ]; then
            SERVICE_SELECTOR="18690ed0-bfdb-45f0-81bf-cad54841b2aa"
          fi

          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN is not set in Secrets or Variables. Skipping deployment. See DEPLOYMENT.md for setup instructions."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
            echo "service_name=$SERVICE_SELECTOR" >> "$GITHUB_OUTPUT"
            echo "token=$RAILWAY_TOKEN" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Railway CLI
        if: steps.validate.outputs.has_token == 'true'
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        if: steps.validate.outputs.has_token == 'true'
        run: |
          set -euo pipefail
          ARGS=(up --ci)
          ARGS+=(--service "${{ steps.validate.outputs.service_name }}")
          echo "Running: railway ${ARGS[*]}"
          railway "${ARGS[@]}"
        env:
          RAILWAY_TOKEN: ${{ steps.validate.outputs.token }}



