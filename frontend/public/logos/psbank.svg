<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 36">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9B2133"/>
      <stop offset="100%" stop-color="#6D1020"/>
    </linearGradient>
  </defs>
  <rect width="108" height="36" rx="5" fill="url(#g)"/>
  <!-- Left accent zone -->
  <rect x="0" y="0" width="33" height="36" rx="5" fill="rgba(255,255,255,0.07)"/>
  <!-- "PS" bold monogram -->
  <text x="16.5" y="24" text-anchor="middle"
    font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="17"
    fill="white">PS</text>
  <!-- Divider -->
  <rect x="34" y="6" width="1" height="24" rx="0.5" fill="rgba(255,255,255,0.22)"/>
  <!-- "BANK" label -->
  <text x="71" y="19.5" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="12"
    fill="rgba(255,255,255,0.95)" letter-spacing="1.8">BANK</text>
  <!-- "PHILIPPINE SAVINGS" subtitle -->
  <text x="71" y="30" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="6.5"
    fill="rgba(255,255,255,0.58)" letter-spacing="0.6">PHILIPPINE SAVINGS</text>
</svg>
